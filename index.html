<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zyxrss.github.io</title>
  <style>
    :root {
      --bg: #f4efe7;
      --card: rgba(255, 255, 255, 0.82);
      --text: #1f2937;
      --muted: #5b6470;
      --accent: #c2410c;
      --border: rgba(31, 41, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(194, 65, 12, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(20, 83, 45, 0.16), transparent 30%),
        linear-gradient(135deg, #f8f5ef 0%, #efe6d8 100%);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(720px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(31, 41, 55, 0.12);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }

    p {
      margin: 16px 0 0;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .status {
      margin-top: 28px;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(194, 65, 12, 0.18);
      background: rgba(255, 247, 237, 0.95);
      color: #9a3412;
      font-weight: 600;
    }

    .meta {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
      font-size: 0.95rem;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">GitHub Pages Test</p>
    <h1>这个页面已经上线测试。</h1>
    <p>
      如果你能在线看到这个页面，说明仓库的 GitHub Pages 发布链路已经打通。
      后面你可以在这个基础上继续替换成正式首页，或者再接入静态站点生成器。
    </p>
    <div class="status">默认访问地址：<a href="https://deathnote2025.github.io/">https://deathnote2025.github.io/</a></div>
    <div class="meta">
      <div class="chip">Repo: deathnote2025/zyxrss.github.io</div>
      <div class="chip">Branch: main</div>
      <div class="chip">Entry: /index.html</div>
      <div class="chip">Updated: 2026-03-27</div>
    </div>
  </main>
</body>
</html>
