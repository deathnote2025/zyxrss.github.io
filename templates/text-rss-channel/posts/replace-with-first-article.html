<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{POST_TITLE}}</title>
  <style>
    :root {
      --bg: #f8f1e7;
      --card: rgba(255, 255, 255, 0.92);
      --line: rgba(31, 41, 55, 0.12);
      --text: #172030;
      --muted: #5d6878;
      --accent: #9f3e16;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 16px 40px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(159, 62, 22, 0.16), transparent 28%),
        linear-gradient(180deg, #fcf8f3 0%, #efe4d7 100%);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 78px rgba(31, 41, 55, 0.12);
    }

    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.4rem); line-height: 1.02; }
    .meta { margin-top: 12px; color: var(--accent); font-weight: 700; }
    p { margin: 16px 0 0; color: var(--muted); line-height: 1.9; font-size: 1.04rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    .actions a {
      display: inline-flex;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>{{POST_TITLE}}</h1>
    <div class="meta">{{POST_DATE_LABEL}} · {{CHANNEL_TITLE}}</div>
    <p>Replace this file with the first real article body for the channel.</p>
    <p>Keep each post as its own stable HTML page under `posts/`.</p>
    <div class="actions">
      <a href="../">返回频道首页</a>
      <a href="../feed.xml">打开 RSS</a>
    </div>
  </main>
</body>
</html>
