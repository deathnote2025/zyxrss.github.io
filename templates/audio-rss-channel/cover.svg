<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Audio RSS Channel Template Cover</title>
  <desc id="desc">Template cover artwork for an audio RSS channel.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2df" />
      <stop offset="100%" stop-color="#f0b56a" />
    </linearGradient>
    <linearGradient id="disc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a3412" />
      <stop offset="100%" stop-color="#431407" />
    </linearGradient>
  </defs>
  <rect width="640" height="640" rx="64" fill="url(#bg)" />
  <circle cx="320" cy="280" r="180" fill="url(#disc)" opacity="0.96" />
  <circle cx="320" cy="280" r="84" fill="#fef3c7" opacity="0.9" />
  <circle cx="320" cy="280" r="20" fill="#7c2d12" />
  <rect x="92" y="430" width="456" height="126" rx="28" fill="#fffaf2" opacity="0.92" />
  <text x="320" y="484" text-anchor="middle" font-size="38" font-family="Avenir Next, Arial, sans-serif" fill="#7c2d12" font-weight="700">Audio RSS Template</text>
</svg>
